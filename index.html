<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-x-hidden">
<div class="watermark"></div>

<header class="sticky top-0 z-40 bg-surface/80 backdrop-blur-md border-b border-glass-stroke shadow-glow-sm px-5 md:px-16 py-4 flex items-center justify-between transition-all-fluid">
    <div class="flex items-center gap-4">
        <h1 class="font-display-lg text-primary text-2xl tracking-tight" style="text-shadow: 0 0 10px rgba(255,85,0,0.5);">ANISH.AI</h1>
        <div class="hidden sm:flex items-center gap-2 bg-surface-container-high px-3 py-1.5 rounded-full border border-glass-stroke shadow-glow-sm">
            <span class="material-symbols-outlined text-primary text-sm">verified</span>
            <span class="text-xs font-label-caps text-on-surface-variant">Quality Verified by IITians</span>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <div class="flex flex-col items-end gap-1">
            <span class="text-xs font-label-caps text-on-surface-variant" id="quota-display">Loading Quota...</span>
            <div class="w-24 h-1.5 bg-surface-container-highest rounded-full overflow-hidden border border-glass-stroke/50">
                <div class="h-full bg-primary rounded-full transition-all-fluid w-full shadow-glow-sm"></div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-5 md:px-16 py-8 md:py-12 space-y-12">
    
    <section class="bg-surface-elevated border border-glass-stroke shadow-glow-sm rounded-xl p-6 md:p-8 space-y-8 transition-all-fluid">
        <div>
            <h2 class="font-headline-sm text-on-surface mb-4">Select Subject</h2>
            <div class="flex flex-wrap gap-3" id="subject-container">
                <button onclick="setSub('Physics', this)" class="subj-btn px-5 py-2.5 rounded-full border border-primary text-primary bg-primary/10 font-medium transition-all-fluid shadow-glow-md">Physics</button>
                <button onclick="setSub('Chemistry', this)" class="subj-btn px-5 py-2.5 rounded-full border border-glass-stroke text-on-surface-variant bg-surface-container hover:border-primary/50 hover:bg-surface-container-high transition-all-fluid">Chemistry</button>
                <button onclick="setSub('Mathematics', this)" class="subj-btn px-5 py-2.5 rounded-full border border-glass-stroke text-on-surface-variant bg-surface-container hover:border-primary/50 hover:bg-surface-container-high transition-all-fluid">Mathematics</button>
            </div>
        </div>
        
        <div>
            <h2 class="font-headline-sm text-on-surface mb-4">Provide Question</h2>
            
            <input type="file" id="file-upload" accept="image/*,application/pdf" class="hidden" onchange="handleFile(event)">
            
            <div id="dropzone" onclick="document.getElementById('file-upload').click()" class="relative border-2 border-dashed border-primary/60 rounded-xl p-6 flex flex-col items-center justify-center text-center bg-primary/5 transition-all-fluid cursor-pointer hover:border-primary hover:bg-primary/10 shadow-glow-inner mb-4">
                
                <div id="file-info" class="hidden items-center gap-6 animate-fade-in-up w-full">
                    <div class="w-20 h-20 rounded-lg overflow-hidden border border-glass-stroke bg-surface-container-high shrink-0 flex items-center justify-center relative">
                        <img id="preview-img" class="w-full h-full object-cover hidden" />
                        <span id="pdf-icon" class="material-symbols-outlined text-primary/70 text-3xl hidden">picture_as_pdf</span>
                    </div>
                    <div class="text-left flex-1">
                        <p id="file-name" class="font-medium text-on-surface truncate max-w-[200px] md:max-w-md">image.jpg</p>
                        <p class="text-sm text-text-muted mt-1">Tap to replace</p>
                    </div>
                    <button onclick="removeFile(event)" class="p-2 bg-surface rounded-full border border-glass-stroke hover:text-error transition-colors">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </div>

                <div id="upload-prompt" class="flex flex-col items-center">
                    <span class="material-symbols-outlined text-primary/70 text-4xl mb-2">cloud_upload</span>
                    <p class="font-medium text-on-surface">Upload Image or PDF</p>
                    <p class="text-sm text-text-muted mt-1">Tap or drag and drop</p>
                </div>
            </div>

            <textarea id="q-text" rows="3" class="w-full bg-surface-container border border-glass-stroke rounded-xl p-4 text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary/50 transition-colors" placeholder="Or type your question/context here..."></textarea>
            
            <div id="verify-box" class="hidden mt-4">
                <label class="text-sm font-label-caps text-tertiary-container mb-2 block">YOUR ANSWER / WORKING</label>
                <textarea id="student-ans" rows="2" class="w-full bg-surface-container border border-tertiary-container/50 rounded-xl p-4 text-on-surface focus:border-tertiary-container transition-colors" placeholder="Enter your logic or answer to verify..."></textarea>
            </div>
        </div>

        <div>
            <h2 class="font-headline-sm text-on-surface mb-4">Solve Mode</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="mode-container">
                <button onclick="setMode('hint', this)" class="mode-btn flex flex-col items-center justify-center p-4 rounded-xl border border-glass-stroke bg-surface-container text-on-surface-variant transition-all-fluid hover:border-primary/50 hover:bg-surface-container-high gap-2">
                    <span class="material-symbols-outlined">lightbulb</span>
                    <span class="font-medium text-sm">Hint Only</span>
                </button>
                <button onclick="setMode('full', this)" class="mode-btn flex flex-col items-center justify-center p-4 rounded-xl border border-primary bg-primary/10 text-primary transition-all-fluid shadow-glow-md gap-2">
                    <span class="material-symbols-outlined">menu_book</span>
                    <span class="font-medium text-sm">Full Sol</span>
                </button>
                <button onclick="setMode('verify', this)" class="mode-btn flex flex-col items-center justify-center p-4 rounded-xl border border-glass-stroke bg-surface-container text-on-surface-variant transition-all-fluid hover:border-primary/50 hover:bg-surface-container-high gap-2">
                    <span class="material-symbols-outlined">fact_check</span>
                    <span class="font-medium text-sm">Verify Me</span>
                </button>
                <button onclick="setMode('answers', this)" class="mode-btn flex flex-col items-center justify-center p-4 rounded-xl border border-glass-stroke bg-surface-container text-on-surface-variant transition-all-fluid hover:border-primary/50 hover:bg-surface-container-high gap-2">
                    <span class="material-symbols-outlined">done_all</span>
                    <span class="font-medium text-sm">Answers</span>
                </button>
            </div>
        </div>

        <button id="solve-btn" onclick="executeSolve()" class="w-full py-4 rounded-xl bg-primary text-on-primary font-bold text-lg transition-all-fluid shadow-glow-lg hover:bg-white hover:text-primary flex items-center justify-center gap-2 border border-primary/80">
            <span class="material-symbols-outlined">bolt</span> Solve Now
        </button>
    </section>

    <div id="loader" class="hidden flex-col items-center justify-center py-20 space-y-6 transition-opacity duration-700">
        <div class="relative w-24 h-24">
            <div class="absolute inset-0 border-2 border-primary/30 rounded-full animate-spin-slow shadow-glow-sm"></div>
            <div class="absolute inset-0 border-t-2 border-primary rounded-full animate-spin" style="animation-duration: 1.5s;"></div>
            <div class="absolute inset-2 border-2 border-secondary/30 rounded-full animate-spin-slow" style="animation-direction: reverse;"></div>
            <div class="absolute inset-2 border-b-2 border-secondary rounded-full animate-spin" style="animation-duration: 2s; animation-direction: reverse;"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-3xl animate-pulse-glow">model_training</span>
            </div>
        </div>
        <p class="font-body-lg text-primary animate-pulse shadow-glow-sm">Analyzing problem...</p>
    </div>

    <section id="result-card" class="hidden bg-surface-container border border-glass-stroke shadow-glow-sm rounded-2xl overflow-hidden transition-all-fluid animate-fade-in-up">
        
        <div class="bg-surface-container-high p-6 border-b border-glass-stroke flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/30 shadow-glow-sm">
                    <span class="material-symbols-outlined">check</span>
                </div>
                <div>
                    <h3 class="font-headline-sm text-on-surface">Solution Generated</h3>
                    <p id="result-meta" class="text-sm text-on-surface-variant">Physics • Full Solution</p>
                </div>
            </div>
            <button onclick="downloadPDF(this)" class="p-2 rounded-lg bg-surface hover:bg-surface-bright transition-all-fluid border border-glass-stroke hover:border-primary/50 text-on-surface-variant hover:text-primary flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">download</span>
                <span class="text-sm font-medium hidden sm:inline">Export PDF</span>
            </button>
        </div>
        
        <div class="p-6 md:p-8 space-y-6">
            <div id="result-body" class="text-on-surface font-body-md leading-relaxed animate-fade-in-up delay-100">
                </div>
            
            <div class="mt-8 pt-6 border-t border-glass-stroke flex gap-3">
                <button onclick="fetchDiagram()" id="diagram-btn" class="px-4 py-2 rounded-lg border border-glass-stroke bg-surface hover:border-primary/50 hover:text-primary transition-colors text-sm font-medium flex items-center gap-2 text-on-surface-variant">
                    <span class="material-symbols-outlined text-sm">architecture</span> Show Diagram
                </button>
            </div>

            <div id="diagram-wrap" class="hidden mt-4 p-4 bg-surface rounded-xl border border-glass-stroke overflow-x-auto text-center">
                <div id="diagram-container"></div>
            </div>
        </div>
    </section>
</main>

<script>
    // ==========================================
    // ⚠️ MANDATORY: INSERT YOUR SUPABASE KEYS ⚠️
    // ==========================================
    const SUPABASE_URL = 'https://druwtgfbjebcwgbhgjci.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRydXd0Z2ZiamViY3dnYmhnamNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDkzMDAsImV4cCI6MjA5MjE4NTMwMH0.1pmrXsJkUgd4DJFszABP114f6aZba25b1T1anfyjgwI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const API = 'https://anish-ai-theta.vercel.app'; 

    // Configure Marked.js exactly as the backend PDF does
    marked.setOptions({ breaks: true, gfm: true });

    let session = null;
    let currentSub = 'Physics';
    let currentMode = 'full';
    let imageBase64 = null;
    let imageType = null;
    let sessionId = null;
    let lastRawSolution = "";

    // ── UI STATE MANAGEMENT ──
    function setSub(sub, btnElement) {
        currentSub = sub;
        document.querySelectorAll('.subj-btn').forEach(btn => {
            btn.className = "subj-btn px-5 py-2.5 rounded-full border border-glass-stroke text-on-surface-variant bg-surface-container hover:border-primary/50 hover:bg-surface-container-high transition-all-fluid";
        });
        btnElement.className = "subj-btn px-5 py-2.5 rounded-full border border-primary text-primary bg-primary/10 font-medium transition-all-fluid shadow-glow-md";
    }

    function setMode(mode, btnElement) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.className = "mode-btn flex flex-col items-center justify-center p-4 rounded-xl border border-glass-stroke bg-surface-container text-on-surface-variant transition-all-fluid hover:border-primary/50 hover:bg-surface-container-high gap-2";
        });
        btnElement.className = "mode-btn flex flex-col items-center justify-center p-4 rounded-xl border border-primary bg-primary/10 text-primary transition-all-fluid shadow-glow-md gap-2";
        
        const verifyBox = document.getElementById('verify-box');
        if (mode === 'verify') verifyBox.classList.remove('hidden');
        else verifyBox.classList.add('hidden');
    }

    // ── FILE HANDLING ──
    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        if (file.size > 3.5 * 1024 * 1024) {
            alert('File is too large. Limit is 3.5MB.');
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            imageBase64 = e.target.result.split(',')[1];
            imageType = file.type || 'image/jpeg';
            
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('file-info').classList.remove('hidden');
            document.getElementById('file-info').classList.add('flex');
            document.getElementById('file-name').innerText = file.name;

            if (imageType === 'application/pdf') {
                document.getElementById('preview-img').classList.add('hidden');
                document.getElementById('pdf-icon').classList.remove('hidden');
            } else {
                document.getElementById('pdf-icon').classList.add('hidden');
                document.getElementById('preview-img').classList.remove('hidden');
                document.getElementById('preview-img').src = e.target.result;
            }
        };
        reader.readAsDataURL(file);
    }

    function removeFile(event) {
        event.stopPropagation();
        imageBase64 = null;
        imageType = null;
        document.getElementById('file-upload').value = '';
        document.getElementById('file-info').classList.add('hidden');
        document.getElementById('file-info').classList.remove('flex');
        document.getElementById('upload-prompt').classList.remove('hidden');
    }

    // ── API & SOLVE LOGIC ──
    async function apiFetch(path, body, method = 'POST') {
        const headers = { 'Content-Type': 'application/json' };
        // If you implement login later, attach Bearer token here
        if (session) headers['Authorization'] = 'Bearer ' + session.access_token;
        const opts = { method, headers };
        if (method !== 'GET' && body) opts.body = JSON.stringify(body);
        const res = await fetch(API + path, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || data.error || 'Failed');
        return data;
    }

    async function executeSolve() {
        const extraText = document.getElementById('q-text').value.trim();
        const studentAnswer = document.getElementById('student-ans').value.trim();
        
        if (!imageBase64 && !extraText) {
            alert('Please upload an image/PDF or type your question.');
            return;
        }
        if (currentMode === 'verify' && !studentAnswer) {
            alert('Please enter your logic to verify.');
            return;
        }

        // UI State: Loading
        document.getElementById('result-card').classList.add('hidden');
        document.getElementById('diagram-wrap').classList.add('hidden');
        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('loader').classList.add('flex');
        document.getElementById('solve-btn').disabled = true;
        document.getElementById('solve-btn').classList.add('opacity-50');

        try {
            const r = await apiFetch('/api/solve', {
                app: 'jee',
                subject: currentSub,
                mode: currentMode,
                imageBase64,
                imageType,
                extraText,
                studentAnswer,
                sessionId: null
            });
            
            sessionId = r.sessionId;
            lastRawSolution = r.answer;
            
            // Set Meta Title
            document.getElementById('result-meta').innerText = `${currentSub} • ${currentMode.toUpperCase()}`;
            
            // Render Markdown using Marked.js (Matches Backend PDF exactly)
            const contentDiv = document.getElementById('result-body');
            let html = marked.parse(r.answer);
            // Unwrap <p> around display math to fix spacing
            html = html.replace(/<p>\s*(\$\$[\s\S]*?\$\$)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*(\\\[[\s\S]*?\\\])\s*<\/p>/g, '$1');
            
            contentDiv.innerHTML = html;
            
            // Render KaTeX
            renderMathInElement(contentDiv, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '\\[', right: '\\]', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false}
                ],
                throwOnError: false
            });

            // UI State: Done
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('loader').classList.remove('flex');
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
            
        } catch (err) {
            alert('Error: ' + err.message);
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('loader').classList.remove('flex');
        } finally {
            document.getElementById('solve-btn').disabled = false;
            document.getElementById('solve-btn').classList.remove('opacity-50');
        }
    }

    async function fetchDiagram() {
        const btn = document.getElementById('diagram-btn');
        const wrap = document.getElementById('diagram-wrap');
        const container = document.getElementById('diagram-container');
        
        btn.innerHTML = '<span class="material-symbols-outlined text-sm animate-spin">refresh</span> Generating...';
        btn.disabled = true;
        
        try {
            const r = await apiFetch('/api/diagram', {
                subject: currentSub,
                question: document.getElementById('q-text').value || 'Image upload',
                solution: lastRawSolution,
                sessionId: sessionId
            });
            
            if (r.svg && r.svg.length > 50) {
                container.innerHTML = r.svg;
                wrap.classList.remove('hidden');
                btn.innerHTML = '<span class="material-symbols-outlined text-sm text-primary">check</span> Diagram Ready';
            } else {
                btn.innerHTML = '<span class="material-symbols-outlined text-sm">block</span> No Diagram Needed';
            }
        } catch(e) {
            btn.innerHTML = '<span class="material-symbols-outlined text-sm">error</span> Failed';
        }
    }

    async function downloadPDF(btnElement) {
        const originalHtml = btnElement.innerHTML;
        btnElement.innerHTML = '<span class="material-symbols-outlined text-sm animate-spin">refresh</span> Generating...';
        btnElement.disabled = true;
        
        try {
            const r = await apiFetch('/api/pdf', {
                text: lastRawSolution,
                imageBase64: imageBase64,
                imageType: imageType,
                svgDiagram: document.getElementById('diagram-container')?.innerHTML || null,
                sessionId: sessionId
            });
            if (r.pdfUrl) window.open(r.pdfUrl, '_blank');
            else throw new Error('PDF URL missing');
        } catch (err) {
            alert('PDF Error: ' + err.message);
        } finally {
            btnElement.innerHTML = originalHtml;
            btnElement.disabled = false;
        }
    }

    // Dummy Init for Quota UI
    window.onload = () => {
        document.getElementById('quota-display').innerText = "Quota active";
    };
</script>
</body>
</html>
